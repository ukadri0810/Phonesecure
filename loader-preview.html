<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>The Privacy Affair Loader</title>
<style>
:root{--paper:#fcf8f2;--muted:#756863;--display:"Iowan Old Style","Palatino Linotype",Palatino,Georgia,serif}
*{box-sizing:border-box}body{margin:0;min-height:100vh;display:grid;place-items:center;background:#fcf8f2;color:#241b18;font-family:Arial,Helvetica,sans-serif;overflow:hidden}
.loader {
  width: min(420px, calc(100vw - 40px));
  text-align: center;
  padding-top: 18px;
}

.loader-scene {
  position: relative;
  width: 250px;
  height: 390px;
  margin: 0 auto 22px;
}

/* The complete pouch assembly appears first */
.pouch-shell {
  position: absolute;
  left: 50%;
  bottom: 0;
  width: 132px;
  height: 242px;
  margin-left: -66px;
  opacity: 0;
  transform: translateY(22px) scale(.98);
  animation: pouchAppear .55s cubic-bezier(.2,.7,.2,1) .12s forwards;
  overflow: visible;
}

.pouch-back {
  position: absolute;
  inset: 0;
  z-index: 1;
  border-radius: 20px 20px 30px 30px;
  background:
linear-gradient(110deg, rgba(255,255,255,.08), transparent 28%),
linear-gradient(165deg, #967062 0%, #624137 58%, #38231d 100%);
  box-shadow: 0 30px 58px rgba(39,24,19,.20);
  overflow: hidden;
}

.pouch-back::before {
  content: "";
  position: absolute;
  inset: 9px;
  border-radius: 13px 13px 22px 22px;
  border: 1px dashed rgba(224,198,157,.28);
}

.pouch-opening {
  position: absolute;
  left: 10px;
  right: 10px;
  top: 21px;
  height: 13px;
  z-index: 2;
  border-radius: 999px;
  background: rgba(27,17,13,.40);
  box-shadow:
inset 0 1px 0 rgba(255,255,255,.08),
0 1px 0 rgba(255,255,255,.04);
}

/* Phone is a child of the pouch, so it stays perfectly aligned */
.loader-phone {
  position: absolute;
  left: 50%;
  top: -190px;
  width: 108px;
  height: 210px;
  margin-left: -54px;
  z-index: 3;
  opacity: 0;
  border-radius: 24px;
  background: linear-gradient(145deg, #121212, #322a26);
  box-shadow: 0 20px 40px rgba(22,14,12,.18);
  overflow: hidden;
  animation: phoneInsert 1.72s cubic-bezier(.28,.72,.24,1) .82s forwards;
}

.loader-phone::before {
  content: "";
  position: absolute;
  inset: 6px;
  border-radius: 18px;
  background:
linear-gradient(155deg, rgba(255,255,255,.16), transparent 42%),
radial-gradient(circle at 28% 18%, rgba(255,255,255,.18), transparent 24%),
linear-gradient(180deg, #d8c7be 0%, #a47f72 36%, #4b3731 100%);
}

.loader-phone::after {
  content: "";
  position: absolute;
  left: 50%;
  top: 12px;
  width: 38px;
  height: 6px;
  margin-left: -19px;
  border-radius: 999px;
  background: #070707;
}

.notify {
  position: absolute;
  right: 14px;
  height: 9px;
  z-index: 4;
  border-radius: 999px;
  background: rgba(255,255,255,.84);
  box-shadow: 0 8px 16px rgba(0,0,0,.08);
  animation: notificationFade .95s ease 1.08s forwards;
}

.notify.n1 { top: 62px; width: 38px; }
.notify.n2 { top: 80px; width: 48px; }
.notify.n3 { top: 98px; width: 28px; }

/* This front panel physically covers the phone as it slides inside */
.pouch-front {
  position: absolute;
  left: 0;
  right: 0;
  top: 58px;
  bottom: 0;
  z-index: 4;
  border-radius: 0 0 30px 30px;
  background:
linear-gradient(110deg, rgba(255,255,255,.06), transparent 30%),
linear-gradient(165deg, #8b6557 0%, #57372d 58%, #32201a 100%);
  overflow: hidden;
  box-shadow: inset 0 1px 0 rgba(255,255,255,.10);
}

.pouch-front::before {
  content: "";
  position: absolute;
  left: 9px;
  right: 9px;
  top: 8px;
  bottom: 9px;
  border-radius: 8px 8px 21px 21px;
  border: 1px dashed rgba(224,198,157,.30);
}

.pouch-front::after {
  content: "";
  position: absolute;
  left: 0;
  right: 0;
  top: 0;
  height: 16px;
  background: linear-gradient(180deg, rgba(0,0,0,.18), transparent);
}

/* Real transparent brand mark printed on the cover */
.pouch-logo {
  position: absolute;
  left: 50%;
  top: 89px;
  width: 100px;
  height: 100px;
  margin-left: -50px;
  z-index: 5;
  object-fit: contain;
  pointer-events: none;
  filter:
brightness(1.15)
contrast(1.08)
drop-shadow(0 1px 0 rgba(24,14,11,.50))
drop-shadow(0 0 5px rgba(224,198,157,.12));
}

.loader-flap {
  position: absolute;
  left: 9px;
  right: 9px;
  top: -15px;
  height: 64px;
  z-index: 6;
  border-radius: 16px 16px 10px 10px;
  background: linear-gradient(160deg, #a47d6e, #5b3b31);
  border: 1px solid rgba(255,255,255,.10);
  box-shadow: inset 0 1px 0 rgba(255,255,255,.10);
  transform-origin: 50% 100%;
  transform: perspective(420px) rotateX(-98deg);
  animation: flapClose .58s cubic-bezier(.2,.7,.2,1) 2.58s forwards;
}

.loader-lock {
  position: absolute;
  left: 50%;
  top: 8px;
  width: 42px;
  height: 20px;
  margin-left: -21px;
  z-index: 7;
  opacity: 0;
  transform: scale(.82);
  border-radius: 8px;
  background: linear-gradient(180deg, #f5f2ed, #bcb4aa);
  box-shadow: 0 8px 18px rgba(0,0,0,.16);
  animation: magneticLock .28s cubic-bezier(.2,.8,.2,1.2) 3.12s forwards;
}

.loader-lock::after {
  content: "";
  position: absolute;
  left: 50%;
  bottom: -8px;
  width: 12px;
  height: 4px;
  margin-left: -6px;
  border-radius: 50%;
  background: rgba(214,190,149,.36);
  filter: blur(3px);
}

.loader-copy {
  opacity: 0;
  transform: translateY(10px);
  animation: copyAppear .48s ease 3.30s forwards;
}

.loader-copy strong {
  display: block;
  margin-bottom: 8px;
  font-family: var(--display);
  font-size: clamp(28px, 5vw, 38px);
  font-weight: 500;
  letter-spacing: -.03em;
}

.loader-copy span {
  display: block;
  color: var(--muted);
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: .18em;
}

.skip-intro {
  position: absolute;
  top: 22px;
  right: 20px;
  border: 0;
  background: transparent;
  color: var(--muted);
  text-transform: uppercase;
  letter-spacing: .15em;
  font-size: 10px;
}

@keyframes pouchAppear {
  to { opacity: 1; transform: translateY(0) scale(1); }
}

@keyframes phoneInsert {
  0%   { opacity: 0; transform: translateY(0); box-shadow: 0 20px 40px rgba(22,14,12,.18); }
  10%  { opacity: 1; transform: translateY(0); box-shadow: 0 20px 40px rgba(22,14,12,.18); }
  24%  { opacity: 1; transform: translateY(0); }
  70%  { opacity: 1; transform: translateY(214px); }
  82%  { opacity: 0; transform: translateY(240px); box-shadow: none; }
  100% { opacity: 0; transform: translateY(252px); box-shadow: none; }
}

@keyframes notificationFade {
  0%, 35% { opacity: 1; transform: translateX(0); }
  100% { opacity: 0; transform: translateX(10px); }
}

@keyframes flapClose {
  from { transform: perspective(420px) rotateX(-98deg); }
  to   { transform: perspective(420px) rotateX(0deg); }
}

@keyframes magneticLock {
  0%   { opacity: 0; transform: scale(.82) translateY(-4px); }
  70%  { opacity: 1; transform: scale(1.08) translateY(0); }
  100% { opacity: 1; transform: scale(1) translateY(0); }
}

@keyframes copyAppear {
  to { opacity: 1; transform: translateY(0); }
}
</style>
</head>
<body>
<div class="loader">
<div class="loader-scene">
  <div class="pouch-shell">
    <div class="pouch-back"></div>
    <div class="pouch-opening"></div>
    <div class="loader-phone">
      <span class="notify n1"></span><span class="notify n2"></span><span class="notify n3"></span>
    </div>
    <div class="pouch-front"></div>
    <img class="pouch-logo" src="assets/logo-pouch.png" alt="The Privacy Affair logo">
    <div class="loader-flap"></div>
    <div class="loader-lock"></div>
  </div>
</div>
<div class="loader-copy"><strong>Be present. Keep it private.</strong><span>Camera-free events & privacy pouches</span></div>
</div>
</body>
</html>
