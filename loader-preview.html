<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="theme-color" content="#f6f1ea" />
  <meta name="description" content="Concept website for The Privacy Affair — camera-free weddings, private celebrations and privacy pouches in Toronto and the GTA." />
  <title>The Privacy Affair — Camera-Free Events</title>
  <style>
    :root {
      --bg: #f6f1ea;
      --paper: #fcf8f2;
      --panel: #f1e8dd;
      --line: rgba(69, 49, 40, 0.14);
      --line-strong: rgba(69, 49, 40, 0.22);
      --text: #241b18;
      --muted: #756863;
      --brown: #51362d;
      --brown-deep: #291c18;
      --brown-soft: #7b5d52;
      --gold: #c49a62;
      --gold-soft: #dbc399;
      --rose: #c7b0a8;
      --shadow: 0 28px 60px rgba(44, 27, 20, 0.10);
      --shadow-strong: 0 34px 80px rgba(34, 18, 14, 0.18);
      --radius: 28px;
      --radius-sm: 18px;
      --display: "Iowan Old Style", "Palatino Linotype", Palatino, "Book Antiqua", Georgia, serif;
      --sans: "Avenir Next", Avenir, "Segoe UI", Helvetica, Arial, sans-serif;
      --ease: cubic-bezier(.2,.7,.2,1);
    }

    * { box-sizing: border-box; }
    html { scroll-behavior: smooth; }
    body {
      margin: 0;
      font-family: var(--sans);
      color: var(--text);
      background: var(--bg);
      -webkit-font-smoothing: antialiased;
      overflow-x: hidden;
    }
    body.modal-open { overflow: hidden; }
    a { text-decoration: none; color: inherit; }
    img { display: block; max-width: 100%; }
    button, input, select, textarea { font: inherit; }
    button { cursor: pointer; }
    ::selection { background: rgba(196,154,98,.22); }

    .container { width: min(1200px, calc(100% - 42px)); margin-inline: auto; }
    .section { padding: clamp(86px, 10vw, 130px) 0; position: relative; }
    .eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 12px;
      color: var(--brown-soft);
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: .18em;
      font-weight: 700;
    }
    .eyebrow::before {
      content: "";
      width: 34px;
      height: 1px;
      background: var(--gold);
    }
    .section-head { max-width: 720px; margin-bottom: 46px; }
    .section-head h2 {
      margin: 18px 0 12px;
      font-family: var(--display);
      font-size: clamp(44px, 5.2vw, 78px);
      line-height: .98;
      letter-spacing: -.04em;
      font-weight: 500;
    }
    .section-head p { margin: 0; color: var(--muted); line-height: 1.75; font-size: 15px; }

    .btn {
      border: 1px solid transparent;
      border-radius: 999px;
      padding: 15px 24px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      font-size: 11px;
      line-height: 1;
      letter-spacing: .14em;
      text-transform: uppercase;
      font-weight: 700;
      transition: transform .28s var(--ease), background .28s var(--ease), border-color .28s var(--ease), color .28s var(--ease), box-shadow .28s var(--ease);
      box-shadow: none;
    }
    .btn:hover { transform: translateY(-2px); }
    .btn-dark { background: var(--brown-deep); color: var(--paper); }
    .btn-dark:hover { background: #3a2823; }
    .btn-light { border-color: var(--line-strong); color: var(--brown-deep); background: transparent; }
    .btn-light:hover { border-color: var(--brown-deep); background: rgba(255,255,255,.45); }
    .btn-ghost { border-color: rgba(255,255,255,.26); color: var(--paper); }
    .btn-ghost:hover { border-color: rgba(255,255,255,.6); }

    /* Preloader */
    .preloader {
      position: fixed;
      inset: 0;
      z-index: 1000;
      display: grid;
      place-items: center;
      background:
        radial-gradient(circle at 20% 20%, rgba(219,195,153,.16), transparent 28%),
        radial-gradient(circle at 80% 70%, rgba(123,93,82,.10), transparent 30%),
        var(--paper);
      transition: opacity .55s ease, visibility .55s ease;
    }
    .preloader.is-hidden { opacity: 0; visibility: hidden; pointer-events: none; }
    .loader {
      width: min(430px, calc(100vw - 40px));
      text-align: center;
      padding-top: 14px;
    }
    .loader-stage {
      width: 260px;
      height: 360px;
      margin: 0 auto 24px;
      position: relative;
    }
    .pouch-animation {
      display: block;
      width: 100%;
      height: 100%;
      overflow: visible;
    }
    .anim-pouch {
      opacity: 0;
      transform: translateY(24px);
      transform-origin: center;
      animation: pouchIn .6s cubic-bezier(.2,.7,.2,1) .12s forwards;
    }
    .anim-phone {
      opacity: 0;
      transform: translateY(0);
      transform-box: fill-box;
      transform-origin: center;
      animation: phoneSlide 1.55s cubic-bezier(.22,.75,.22,1) .68s forwards;
    }
    .anim-phone-screen {
      animation: screenQuiet 1.3s ease .78s forwards;
    }
    .anim-note-1,
    .anim-note-2,
    .anim-note-3 {
      animation: noteOut .52s ease 1.18s forwards;
    }
    .anim-note-2 { animation-delay: 1.28s; }
    .anim-note-3 { animation-delay: 1.38s; }
    .anim-front-cover {
      opacity: .48;
      animation: coverSettle .42s ease 2.08s forwards;
    }
    .anim-logo-badge {
      opacity: 1;
      transform-box: fill-box;
      transform-origin: center;
    }
    .anim-flap-open {
      opacity: 1;
      animation: openFlapAway .24s ease 2.16s forwards;
    }
    .anim-flap-closed {
      opacity: 0;
      transform: translateY(-16px) scaleY(.75);
      transform-box: fill-box;
      transform-origin: 50% 0%;
      animation: closeFlap .42s cubic-bezier(.2,.8,.2,1) 2.18s forwards;
    }
    .anim-lock {
      opacity: 0;
      transform: translateY(-8px) scale(.72);
      transform-box: fill-box;
      transform-origin: center;
      animation: lockSnap .34s cubic-bezier(.2,1.35,.3,1) 2.55s forwards;
    }
    .anim-lock-ring {
      opacity: 0;
      transform-box: fill-box;
      transform-origin: center;
      animation: lockRing .55s ease-out 2.62s forwards;
    }
    .loader-copy {
      opacity: 0;
      transform: translateY(10px);
      animation: copyAppear .7s ease 2.55s forwards;
    }
    .loader-copy strong {
      display: block;
      font-family: var(--display);
      font-size: clamp(28px, 5vw, 38px);
      font-weight: 500;
      letter-spacing: -.03em;
      margin-bottom: 8px;
    }
    .loader-copy span {
      display: block;
      color: var(--muted);
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: .18em;
    }
    .skip-intro {
      position: absolute;
      top: 22px;
      right: 20px;
      border: 0;
      background: transparent;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: .15em;
      font-size: 10px;
    }

    @keyframes pouchIn {
      to { opacity: 1; transform: translateY(0); }
    }
    @keyframes phoneSlide {
      0% { opacity: 0; transform: translateY(0); }
      12% { opacity: 1; transform: translateY(0); }
      30% { opacity: 1; transform: translateY(0); }
      100% { opacity: 1; transform: translateY(222px); }
    }
    @keyframes screenQuiet {
      0%, 42% { filter: brightness(1); }
      100% { filter: brightness(.68) saturate(.65); }
    }
    @keyframes noteOut {
      to { opacity: 0; transform: translateX(10px); }
    }
    @keyframes coverSettle {
      to { opacity: .64; }
    }
    @keyframes openFlapAway {
      to { opacity: 0; }
    }
    @keyframes closeFlap {
      to { opacity: 1; transform: translateY(0) scaleY(1); }
    }
    @keyframes lockSnap {
      0% { opacity: 0; transform: translateY(-8px) scale(.72); }
      70% { opacity: 1; transform: translateY(1px) scale(1.08); }
      100% { opacity: 1; transform: translateY(0) scale(1); }
    }
    @keyframes lockRing {
      0% { opacity: .55; transform: scale(.55); }
      100% { opacity: 0; transform: scale(1.65); }
    }
    @keyframes copyAppear {
      to { opacity: 1; transform: none; }
    }
    .site-header.scrolled {
      background: rgba(250,246,239,.76);
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
      border-color: var(--line);
      padding: 10px 0;
    }
    .nav {
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      align-items: center;
      gap: 20px;
    }
    .nav-links,
    .nav-actions {
      display: flex;
      align-items: center;
      gap: 26px;
    }
    .nav-actions { justify-content: flex-end; }
    .nav-link {
      position: relative;
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: .13em;
      color: rgba(36,27,24,.76);
    }
    .nav-link::after {
      content: "";
      position: absolute;
      left: 0;
      right: 100%;
      bottom: -6px;
      height: 1px;
      background: var(--gold);
      transition: right .25s ease;
    }
    .nav-link:hover::after { right: 0; }
    .brand {
      width: 70px;
      height: 70px;
      border-radius: 50%;
      overflow: hidden;
      border: 1px solid rgba(196,154,98,.24);
      box-shadow: 0 10px 26px rgba(44,27,20,.08);
      background: #fff;
      transition: width .35s ease, height .35s ease;
    }
    .site-header.scrolled .brand { width: 56px; height: 56px; }
    .brand img { width: 100%; height: 100%; object-fit: cover; }
    .menu-toggle { display: none; }

    /* Hero */
    .hero {
      position: relative;
      min-height: 100svh;
      display: grid;
      align-items: center;
      padding: 144px 0 76px;
      overflow: hidden;
      background:
        radial-gradient(circle at 82% 16%, rgba(219,195,153,.18), transparent 28%),
        radial-gradient(circle at 12% 76%, rgba(123,93,82,.10), transparent 30%),
        var(--paper);
    }
    .hero::before {
      content: "";
      position: absolute;
      width: 680px;
      height: 680px;
      right: -300px;
      top: 40px;
      border: 1px solid rgba(196,154,98,.18);
      border-radius: 50%;
    }
    .hero-grid {
      display: grid;
      grid-template-columns: .9fr 1.1fr;
      gap: clamp(42px, 6vw, 96px);
      align-items: center;
    }
    .hero-copy { position: relative; z-index: 2; }
    .hero-copy h1 {
      margin: 20px 0 20px;
      font-family: var(--display);
      font-size: clamp(60px, 7vw, 98px);
      line-height: .92;
      letter-spacing: -.05em;
      font-weight: 500;
    }
    .hero-copy h1 em {
      display: block;
      font-style: normal;
      color: var(--gold);
      font-weight: 400;
    }
    .hero-copy p {
      max-width: 530px;
      margin: 0 0 32px;
      font-size: 17px;
      line-height: 1.8;
      color: #5f5551;
    }
    .hero-actions { display: flex; flex-wrap: wrap; gap: 12px; margin-bottom: 28px; }
    .hero-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 18px;
      color: var(--muted);
      font-size: 11px;
      letter-spacing: .12em;
      text-transform: uppercase;
    }
    .hero-meta span { display: inline-flex; align-items: center; gap: 8px; }
    .hero-meta span::before { content: "✦"; color: var(--gold); font-size: 8px; }

    .hero-stage {
      position: relative;
      min-height: 700px;
      isolation: isolate;
    }
    .hero-frame {
      position: absolute;
      inset: 34px 56px 18px 96px;
      border-radius: 340px 340px 34px 34px;
      overflow: hidden;
      background: #d3c0b1;
      box-shadow: var(--shadow-strong);
    }
    .hero-frame::after {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(180deg, rgba(255,255,255,.08), rgba(32,16,12,.22));
    }
    .hero-frame img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      filter: saturate(.8) contrast(.95);
      transform: scale(1.04);
    }
    .hero-product {
      position: absolute;
      left: 44%;
      bottom: 34px;
      width: 290px;
      border-radius: 30px;
      overflow: hidden;
      background: #e9ddd2;
      box-shadow: 0 32px 72px rgba(35,20,15,.24);
      transform: translateX(-50%) rotate(-3deg);
      z-index: 4;
    }
    .hero-product img { width: 100%; aspect-ratio: 9 / 14; object-fit: cover; }
    .hero-product .stamp {
      position: absolute;
      right: 16px;
      top: 16px;
      background: rgba(252,248,242,.88);
      border: 1px solid rgba(81,54,45,.12);
      padding: 10px 12px;
      border-radius: 14px;
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: .12em;
      color: var(--brown);
      backdrop-filter: blur(8px);
    }
    .hero-card {
      position: absolute;
      background: var(--paper);
      border: 1px solid rgba(81,54,45,.1);
      box-shadow: 0 24px 50px rgba(31,18,14,.12);
      z-index: 5;
    }
    .hero-card.card-a {
      width: 190px;
      left: 0;
      bottom: 66px;
      padding: 10px;
      transform: rotate(-4deg);
    }
    .hero-card.card-b {
      width: 175px;
      right: 0;
      top: 88px;
      padding: 14px 16px;
      transform: rotate(3deg);
    }
    .hero-card.card-a img { aspect-ratio: 3 / 4; object-fit: cover; }
    .hero-card.card-b strong {
      display: block;
      font-family: var(--display);
      font-size: 24px;
      line-height: 1.08;
      font-weight: 500;
      margin-bottom: 10px;
    }
    .hero-card.card-b span {
      display: block;
      color: var(--muted);
      line-height: 1.65;
      font-size: 13px;
    }
    .hero-monogram {
      position: absolute;
      left: 58px;
      top: 34px;
      width: 108px;
      height: 108px;
      border-radius: 50%;
      background: rgba(252,248,242,.9);
      box-shadow: 0 18px 38px rgba(31,18,14,.10);
      border: 1px solid rgba(196,154,98,.18);
      display: grid;
      place-items: center;
      z-index: 5;
      overflow: hidden;
    }
    .hero-monogram img { width: 76%; height: 76%; object-fit: contain; }

    /* Intro text strip */
    .manifesto {
      padding: 38px 0 0;
      margin-top: -10px;
    }
    .manifesto-grid {
      display: grid;
      grid-template-columns: 1fr 1.2fr;
      gap: 44px;
      align-items: start;
      padding-top: 24px;
      border-top: 1px solid var(--line);
    }
    .manifesto-note {
      font-family: var(--display);
      font-size: clamp(22px, 3vw, 34px);
      line-height: 1.2;
      color: var(--brown);
    }
    .manifesto-copy {
      color: var(--muted);
      font-size: 15px;
      line-height: 1.85;
      max-width: 700px;
    }

    /* Services */
    .services-wrap {
      background: linear-gradient(180deg, rgba(255,255,255,.45), rgba(255,255,255,.12));
      border: 1px solid rgba(81,54,45,.08);
      border-radius: 34px;
      overflow: hidden;
      box-shadow: var(--shadow);
    }
    .services-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
    }
    .service-panel {
      position: relative;
      padding: 42px clamp(24px, 4vw, 42px) 44px;
      min-height: 430px;
      display: flex;
      flex-direction: column;
    }
    .service-panel + .service-panel { border-left: 1px solid rgba(81,54,45,.08); }
    .service-label {
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: .16em;
      color: var(--brown-soft);
      margin-bottom: 18px;
      font-weight: 700;
    }
    .service-panel h3 {
      margin: 0 0 14px;
      font-family: var(--display);
      font-size: clamp(34px, 4vw, 52px);
      line-height: 1;
      letter-spacing: -.035em;
      font-weight: 500;
    }
    .service-panel > p {
      max-width: 470px;
      color: var(--muted);
      line-height: 1.8;
      margin: 0 0 28px;
      font-size: 15px;
    }
    .service-list { display: grid; gap: 14px; margin-bottom: auto; }
    .service-item {
      display: grid;
      grid-template-columns: 20px 1fr;
      gap: 12px;
      color: var(--text);
      font-size: 14px;
      line-height: 1.65;
      padding-right: 18px;
    }
    .service-item::before { content: "✦"; color: var(--gold); }
    .service-footer {
      margin-top: 30px;
      padding-top: 24px;
      border-top: 1px solid rgba(81,54,45,.09);
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      align-items: center;
      justify-content: space-between;
    }
    .service-footer small {
      color: var(--muted);
      line-height: 1.7;
      max-width: 240px;
    }

    /* Process */
    .process-grid {
      display: grid;
      grid-template-columns: .7fr 1.3fr;
      gap: clamp(34px, 6vw, 84px);
      align-items: start;
    }
    .process-aside {
      position: sticky;
      top: 120px;
    }
    .process-aside .note {
      margin-top: 26px;
      border-left: 2px solid rgba(196,154,98,.44);
      padding-left: 18px;
      color: var(--muted);
      line-height: 1.8;
      font-size: 15px;
      max-width: 390px;
    }
    .timeline { display: grid; gap: 18px; }
    .timeline-item {
      position: relative;
      display: grid;
      grid-template-columns: 76px 1fr;
      gap: 18px;
      padding: 22px 0 24px;
      border-top: 1px solid var(--line);
    }
    .timeline-item:last-child { border-bottom: 1px solid var(--line); }
    .timeline-step {
      font-family: var(--display);
      font-size: 34px;
      color: var(--gold);
      line-height: 1;
    }
    .timeline-body h3 {
      margin: 0 0 7px;
      font-family: var(--display);
      font-size: 30px;
      font-weight: 500;
      line-height: 1.05;
    }
    .timeline-body p {
      margin: 0;
      color: var(--muted);
      line-height: 1.8;
      font-size: 15px;
      max-width: 560px;
    }

    /* Spotlight */
    .spotlight {
      background: var(--brown-deep);
      color: var(--paper);
      overflow: hidden;
    }
    .spotlight::before {
      content: "";
      position: absolute;
      width: 540px;
      height: 540px;
      right: -180px;
      top: -140px;
      border: 1px solid rgba(219,195,153,.10);
      border-radius: 50%;
    }
    .spotlight-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: clamp(30px, 5vw, 70px);
      align-items: center;
    }
    .spotlight-visual {
      position: relative;
      padding-right: 38px;
    }
    .spotlight-main {
      width: min(420px, 100%);
      margin-inline: auto;
      border-radius: 26px;
      overflow: hidden;
      box-shadow: 0 28px 70px rgba(0,0,0,.28);
    }
    .spotlight-main img { width: 100%; aspect-ratio: 9 / 15; object-fit: cover; }
    .spotlight-floating {
      position: absolute;
      right: 0;
      bottom: 28px;
      width: 180px;
      padding: 16px;
      background: rgba(252,248,242,.08);
      border: 1px solid rgba(255,255,255,.12);
      backdrop-filter: blur(8px);
      border-radius: 18px;
      box-shadow: 0 16px 40px rgba(0,0,0,.18);
    }
    .spotlight-floating strong {
      display: block;
      font-family: var(--display);
      font-weight: 500;
      font-size: 22px;
      margin-bottom: 6px;
      line-height: 1.08;
    }
    .spotlight-floating span {
      display: block;
      color: rgba(252,248,242,.72);
      font-size: 13px;
      line-height: 1.6;
    }
    .spotlight-copy .eyebrow { color: var(--gold-soft); }
    .spotlight-copy h2 {
      margin: 16px 0 16px;
      font-family: var(--display);
      font-size: clamp(44px, 5.5vw, 78px);
      line-height: .98;
      letter-spacing: -.04em;
      font-weight: 500;
    }
    .spotlight-copy p {
      margin: 0 0 28px;
      color: rgba(252,248,242,.72);
      line-height: 1.85;
      font-size: 15px;
      max-width: 520px;
    }
    .spotlight-list { display: grid; gap: 14px; margin-bottom: 30px; }
    .spotlight-list li {
      list-style: none;
      display: grid;
      grid-template-columns: 18px 1fr;
      gap: 12px;
      color: rgba(252,248,242,.88);
      font-size: 14px;
      line-height: 1.7;
    }
    .spotlight-list li::before { content: "✦"; color: var(--gold-soft); }

    /* Instagram */
    .reels-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 22px;
      align-items: start;
    }
    .reel {
      position: relative;
      border-radius: 24px;
      overflow: hidden;
      background: #d8ccc0;
      box-shadow: 0 26px 54px rgba(34,18,14,.14);
      aspect-ratio: 9 / 15.5;
      border: 1px solid rgba(81,54,45,.08);
    }
    .reel:nth-child(2) { transform: translateY(42px); }
    .reel img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      filter: saturate(.82) contrast(.96);
      transition: transform .8s var(--ease);
    }
    .reel:hover img { transform: scale(1.03); }
    .reel::after {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(180deg, transparent 58%, rgba(28,16,12,.8));
    }
    .reel-meta {
      position: absolute;
      inset: auto 18px 18px;
      z-index: 2;
      display: flex;
      justify-content: space-between;
      gap: 16px;
      align-items: end;
      color: var(--paper);
    }
    .reel-meta strong {
      display: block;
      font-family: var(--display);
      font-size: 23px;
      line-height: 1.05;
      font-weight: 500;
      margin-bottom: 6px;
    }
    .reel-meta span {
      display: block;
      color: rgba(252,248,242,.72);
      font-size: 11px;
      letter-spacing: .12em;
      text-transform: uppercase;
    }
    .reel-play {
      width: 42px;
      height: 42px;
      flex: 0 0 auto;
      border-radius: 50%;
      display: grid;
      place-items: center;
      background: rgba(252,248,242,.12);
      border: 1px solid rgba(255,255,255,.18);
      backdrop-filter: blur(8px);
      font-size: 12px;
    }
    .reels-footer {
      margin-top: 82px;
      display: flex;
      gap: 24px;
      align-items: center;
      justify-content: space-between;
    }
    .reels-footer p { margin: 0; color: var(--muted); max-width: 560px; line-height: 1.8; }

    /* FAQ */
    .faq-grid {
      display: grid;
      grid-template-columns: .72fr 1.28fr;
      gap: clamp(34px, 6vw, 92px);
      align-items: start;
    }
    .faq-title { position: sticky; top: 120px; }
    .faq-title h2 {
      margin: 16px 0 16px;
      font-family: var(--display);
      font-size: clamp(46px, 5vw, 74px);
      line-height: .98;
      letter-spacing: -.04em;
      font-weight: 500;
    }
    .faq-title p { color: var(--muted); line-height: 1.8; }
    .faq-item { border-top: 1px solid var(--line); }
    .faq-item:last-child { border-bottom: 1px solid var(--line); }
    .faq-q {
      width: 100%;
      background: transparent;
      border: 0;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      text-align: left;
      padding: 24px 0;
      font-family: var(--display);
      font-size: 24px;
      line-height: 1.15;
      color: var(--text);
    }
    .faq-icon {
      width: 32px;
      height: 32px;
      border: 1px solid var(--line);
      border-radius: 50%;
      display: grid;
      place-items: center;
      font-size: 18px;
      color: var(--muted);
      flex: 0 0 auto;
      transition: transform .25s ease;
    }
    .faq-item.open .faq-icon { transform: rotate(45deg); }
    .faq-a {
      max-height: 0;
      overflow: hidden;
      transition: max-height .4s ease;
    }
    .faq-a p {
      margin: 0;
      padding: 0 44px 24px 0;
      color: var(--muted);
      line-height: 1.8;
      font-size: 15px;
    }

    /* Final CTA */
    .closing {
      background: linear-gradient(180deg, #e4d4c7, #dac7b8);
      overflow: hidden;
    }
    .closing::before,
    .closing::after {
      content: "";
      position: absolute;
      border-radius: 50%;
      border: 1px solid rgba(81,54,45,.12);
    }
    .closing::before { width: 560px; height: 560px; left: -280px; top: -240px; }
    .closing::after { width: 340px; height: 340px; right: -150px; bottom: -160px; }
    .closing-inner {
      position: relative;
      z-index: 2;
      max-width: 860px;
      margin: 0 auto;
      text-align: center;
    }
    .closing-inner h2 {
      margin: 18px auto 18px;
      font-family: var(--display);
      font-size: clamp(54px, 6.2vw, 94px);
      line-height: .92;
      letter-spacing: -.05em;
      font-weight: 500;
    }
    .closing-inner p {
      max-width: 620px;
      margin: 0 auto 30px;
      color: #5d504a;
      line-height: 1.8;
      font-size: 15px;
    }
    .closing-inner .hero-actions { justify-content: center; margin-bottom: 0; }

    /* Footer */
    footer {
      background: var(--brown-deep);
      color: rgba(252,248,242,.68);
      padding: 44px 0 26px;
    }
    .footer-grid {
      display: grid;
      grid-template-columns: 1.1fr .9fr .9fr;
      gap: 34px;
      align-items: start;
    }
    .footer-brand {
      display: flex;
      gap: 16px;
      align-items: center;
    }
    .footer-brand img {
      width: 66px;
      height: 66px;
      border-radius: 50%;
      object-fit: cover;
      background: #fff;
    }
    .footer-brand strong {
      display: block;
      color: var(--paper);
      font-family: var(--display);
      font-size: 24px;
      font-weight: 500;
    }
    .footer-brand span {
      display: block;
      margin-top: 6px;
      text-transform: uppercase;
      letter-spacing: .15em;
      font-size: 10px;
    }
    .footer-col h4 {
      margin: 0 0 12px;
      color: var(--paper);
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: .14em;
    }
    .footer-col a, .footer-col p {
      display: block;
      margin: 10px 0;
      color: rgba(252,248,242,.68);
      line-height: 1.7;
      font-size: 14px;
    }
    .footer-col a:hover { color: var(--gold-soft); }
    .footer-bottom {
      margin-top: 36px;
      padding-top: 18px;
      border-top: 1px solid rgba(255,255,255,.1);
      display: flex;
      justify-content: space-between;
      gap: 16px;
      flex-wrap: wrap;
      font-size: 11px;
    }

    /* Modal */
    .modal {
      position: fixed;
      inset: 0;
      z-index: 300;
      display: grid;
      place-items: center;
      padding: 18px;
      background: rgba(26,16,12,.66);
      backdrop-filter: blur(10px);
      opacity: 0;
      visibility: hidden;
      transition: opacity .3s ease, visibility .3s ease;
    }
    .modal.open { opacity: 1; visibility: visible; }
    .modal-panel {
      width: min(780px, 100%);
      max-height: min(820px, calc(100svh - 36px));
      overflow: auto;
      background: var(--paper);
      border-radius: 28px;
      box-shadow: 0 40px 90px rgba(0,0,0,.34);
      transform: translateY(16px) scale(.985);
      transition: transform .35s ease;
    }
    .modal.open .modal-panel { transform: none; }
    .modal-head {
      position: sticky;
      top: 0;
      z-index: 2;
      background: rgba(252,248,242,.96);
      backdrop-filter: blur(14px);
      padding: 18px 22px 12px;
      border-bottom: 1px solid var(--line);
    }
    .modal-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
    }
    .modal-brand {
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .modal-brand img {
      width: 42px;
      height: 42px;
      border-radius: 50%;
      object-fit: cover;
      background: #fff;
    }
    .modal-brand strong {
      display: block;
      font-family: var(--display);
      font-size: 20px;
      font-weight: 500;
      color: var(--text);
    }
    .modal-brand span {
      display: block;
      color: var(--muted);
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: .12em;
      margin-top: 3px;
    }
    .modal-close {
      border: 0;
      background: transparent;
      width: 40px;
      height: 40px;
      border-radius: 50%;
      color: var(--muted);
      font-size: 24px;
    }
    .progress {
      height: 2px;
      margin-top: 13px;
      background: rgba(81,54,45,.1);
      overflow: hidden;
    }
    .progress span {
      display: block;
      height: 100%;
      width: 25%;
      background: var(--gold);
      transition: width .3s ease;
    }
    .modal-body { padding: 40px clamp(22px, 6vw, 58px) 48px; }
    .step { display: none; }
    .step.active { display: block; }
    .step-counter {
      color: var(--gold);
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: .18em;
      font-weight: 700;
    }
    .step h3 {
      margin: 14px 0 12px;
      font-family: var(--display);
      font-size: clamp(34px, 5vw, 52px);
      line-height: 1.02;
      letter-spacing: -.035em;
      font-weight: 500;
    }
    .step > p {
      color: var(--muted);
      margin: 0 0 24px;
      line-height: 1.75;
      font-size: 15px;
      max-width: 560px;
    }
    .choices { display: grid; grid-template-columns: repeat(2, 1fr); gap: 14px; }
    .choice {
      border: 1px solid var(--line);
      background: rgba(255,255,255,.36);
      padding: 22px;
      border-radius: 20px;
      text-align: left;
      min-height: 142px;
      transition: border-color .24s ease, background .24s ease, transform .24s ease;
    }
    .choice:hover { transform: translateY(-2px); border-color: rgba(196,154,98,.56); }
    .choice.selected { border-color: var(--gold); background: rgba(196,154,98,.12); box-shadow: inset 0 0 0 1px rgba(196,154,98,.45); }
    .choice strong {
      display: block;
      font-family: var(--display);
      font-size: 26px;
      line-height: 1.05;
      font-weight: 500;
      margin-bottom: 8px;
    }
    .choice span {
      display: block;
      color: var(--muted);
      line-height: 1.6;
      font-size: 13px;
    }
    .fields { display: grid; grid-template-columns: repeat(2, 1fr); gap: 14px; }
    .field { display: block; }
    .field.full { grid-column: 1 / -1; }
    .field label {
      display: block;
      margin-bottom: 7px;
      color: var(--muted);
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: .14em;
      font-weight: 700;
    }
    .field input, .field select, .field textarea {
      width: 100%;
      border: 1px solid var(--line);
      background: rgba(255,255,255,.5);
      color: var(--text);
      padding: 14px 15px;
      border-radius: 14px;
      outline: none;
      transition: border-color .2s ease, background .2s ease;
    }
    .field input:focus, .field select:focus, .field textarea:focus {
      border-color: rgba(196,154,98,.75);
      background: #fff;
    }
    .field textarea { min-height: 118px; resize: vertical; }
    .modal-actions {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      margin-top: 28px;
      flex-wrap: wrap;
    }
    .summary {
      background: rgba(255,255,255,.54);
      border: 1px solid var(--line);
      border-radius: 18px;
      padding: 20px;
      display: grid;
      gap: 12px;
      margin-top: 8px;
    }
    .summary-row {
      display: grid;
      grid-template-columns: 150px 1fr;
      gap: 14px;
      color: var(--text);
      font-size: 14px;
      line-height: 1.6;
      border-bottom: 1px solid rgba(81,54,45,.08);
      padding-bottom: 10px;
    }
    .summary-row:last-child { border-bottom: 0; padding-bottom: 0; }
    .summary-row strong {
      color: var(--muted);
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: .14em;
      align-self: start;
    }

    [data-reveal] {
      opacity: 0;
      transform: translateY(24px);
      transition: opacity .7s var(--ease), transform .7s var(--ease);
    }
    [data-reveal].is-visible {
      opacity: 1;
      transform: none;
    }

    @media (max-width: 1100px) {
      .hero-grid,
      .spotlight-grid,
      .faq-grid,
      .process-grid,
      .manifesto-grid,
      .footer-grid,
      .services-grid { grid-template-columns: 1fr; }
      .process-aside,
      .faq-title { position: static; }
      .service-panel + .service-panel { border-left: 0; border-top: 1px solid rgba(81,54,45,.08); }
      .hero-stage { min-height: 620px; }
      .hero-frame { inset: 20px 36px 30px 72px; }
      .spotlight-visual { padding-right: 0; }
      .spotlight-floating { right: 18px; bottom: 18px; }
      .faq-title { margin-bottom: 12px; }
    }

    @media (max-width: 860px) {
      .nav {
        grid-template-columns: auto 1fr auto;
      }
      .nav-links,
      .nav-actions .nav-link,
      .nav-actions .btn-light { display: none; }
      .nav-actions { gap: 10px; }
      .menu-toggle {
        display: inline-flex;
        width: 42px;
        height: 42px;
        align-items: center;
        justify-content: center;
        border-radius: 50%;
        border: 1px solid var(--line);
        background: rgba(255,255,255,.34);
      }
      .hero { padding-top: 124px; }
      .hero-grid { gap: 34px; }
      .hero-stage { min-height: 540px; }
      .hero-frame { inset: 26px 18px 14px 42px; }
      .hero-product { width: 226px; left: 50%; bottom: 18px; }
      .hero-card.card-a { width: 146px; bottom: 28px; }
      .hero-card.card-b { width: 154px; top: 52px; }
      .hero-monogram { width: 86px; height: 86px; left: 18px; top: 10px; }
      .reels-grid,
      .choices,
      .fields { grid-template-columns: 1fr; }
      .reel:nth-child(2) { transform: none; }
      .reels-footer,
      .footer-bottom,
      .service-footer,
      .modal-actions { flex-direction: column; align-items: stretch; }
      .timeline-item { grid-template-columns: 58px 1fr; }
    }

    @media (max-width: 620px) {
      .container { width: min(100%, calc(100% - 28px)); }
      .section { padding: 72px 0; }
      .brand { width: 58px; height: 58px; }
      .hero-copy h1 { font-size: clamp(46px, 13vw, 70px); }
      .hero-copy p { font-size: 15px; }
      .hero-meta { gap: 12px; }
      .hero-stage { min-height: 450px; }
      .hero-frame {
        inset: 16px 10px 14px 28px;
        border-radius: 220px 220px 24px 24px;
      }
      .hero-product { width: 180px; border-radius: 20px; }
      .hero-card.card-a {
        width: 112px;
        padding: 6px;
        left: 0;
        bottom: 18px;
      }
      .hero-card.card-b {
        width: 132px;
        right: -2px;
        padding: 12px;
      }
      .hero-card.card-b strong { font-size: 18px; }
      .hero-card.card-b span { font-size: 11px; }
      .section-head h2,
      .spotlight-copy h2,
      .faq-title h2,
      .closing-inner h2 { font-size: clamp(38px, 12vw, 58px); }
      .service-panel h3,
      .timeline-body h3,
      .step h3 { font-size: 30px; }
      .reels-footer { margin-top: 28px; }
      .summary-row { grid-template-columns: 1fr; gap: 6px; }
      .loader-stage { width: 224px; height: 310px; }
      .loader-copy strong { font-size: 30px; }
    }

    @media (prefers-reduced-motion: reduce) {
      html { scroll-behavior: auto; }
      *, *::before, *::after {
        animation-duration: 0.01ms !important;
        animation-iteration-count: 1 !important;
        transition-duration: 0.01ms !important;
      }
      .preloader { display: none; }
      [data-reveal] { opacity: 1; transform: none; }
    }
  </style>
</head>
