<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>The Privacy Affair Loader</title>
  <style>
    :root {
      --bg: #f6f1ea;
      --brown-1: #9a7566;
      --brown-2: #69473b;
      --brown-3: #3c2720;
      --gold: #d6be95;
      --lock-1: #f5f2ed;
      --lock-2: #bdb5aa;
      --shadow: 0 28px 60px rgba(36, 22, 18, 0.18);
      --phone-shadow: 0 18px 36px rgba(22, 16, 14, 0.16);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: var(--bg);
      font-family: Arial, Helvetica, sans-serif;
      overflow: hidden;
    }

    .loader-wrap {
      width: min(360px, calc(100vw - 32px));
      text-align: center;
    }

    .scene {
      position: relative;
      width: 220px;
      height: 350px;
      margin: 0 auto 26px;
    }

    /* POUCH */
    .pouch {
      position: absolute;
      left: 50%;
      bottom: 0;
      width: 136px; /* slightly wider than phone */
      height: 240px;
      margin-left: -68px;
      opacity: 0;
      transform: translateY(24px) scale(.98);
      animation: pouchIn .55s cubic-bezier(.2,.7,.2,1) .15s forwards;
    }

    .pouch-back {
      position: absolute;
      inset: 0;
      border-radius: 22px 22px 30px 30px;
      background: linear-gradient(165deg, var(--brown-1) 0%, var(--brown-2) 58%, var(--brown-3) 100%);
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .pouch-back::before {
      content: "";
      position: absolute;
      inset: 10px;
      border-radius: 14px 14px 22px 22px;
      border: 1px dashed rgba(214,190,149,.28);
    }

    .pouch-opening {
      position: absolute;
      left: 10px;
      right: 10px;
      top: 20px;
      height: 12px;
      border-radius: 999px;
      background: rgba(28, 18, 14, 0.36);
      z-index: 2;
      box-shadow: inset 0 1px 0 rgba(255,255,255,.08);
    }

    /* PHONE */
    .phone {
      position: absolute;
      left: 50%;
      top: 0;
      width: 108px;
      height: 208px;
      margin-left: -54px;
      border-radius: 24px;
      background: linear-gradient(145deg, #151515, #302925);
      box-shadow: var(--phone-shadow);
      overflow: hidden;
      z-index: 3; /* above back, below front */
      opacity: 0;
      transform: translateY(0);
      animation: phoneSlide 2.2s cubic-bezier(.28,.72,.24,1) .65s forwards;
    }

    .phone::before {
      content: "";
      position: absolute;
      inset: 6px;
      border-radius: 18px;
      background:
        linear-gradient(160deg, rgba(255,255,255,.15), transparent 40%),
        radial-gradient(circle at 30% 18%, rgba(255,255,255,.18), transparent 24%),
        linear-gradient(180deg, #d9c7be 0%, #a67f72 34%, #4b3732 100%);
    }

    .phone::after {
      content: "";
      position: absolute;
      width: 38px;
      height: 6px;
      left: 50%;
      top: 12px;
      margin-left: -19px;
      border-radius: 999px;
      background: #070707;
    }

    .notif {
      position: absolute;
      right: 14px;
      height: 9px;
      border-radius: 999px;
      background: rgba(255,255,255,.84);
      box-shadow: 0 8px 16px rgba(0,0,0,.08);
      z-index: 4;
      animation: notifFade 1.25s ease .9s forwards;
    }

    .notif.n1 { top: 64px; width: 38px; }
    .notif.n2 { top: 82px; width: 50px; }
    .notif.n3 { top: 100px; width: 28px; }

    /* FRONT COVER */
    .pouch-front {
      position: absolute;
      left: 0;
      right: 0;
      top: 48px;
      bottom: 0;
      z-index: 5; /* hides phone when inside */
      border-radius: 0 0 30px 30px;
      background: linear-gradient(165deg, #8a6557 0%, #57372d 58%, #34211b 100%);
      overflow: hidden;
      box-shadow: inset 0 1px 0 rgba(255,255,255,.10);
    }

    .pouch-front::before {
      content: "";
      position: absolute;
      left: 10px;
      right: 10px;
      top: 8px;
      bottom: 10px;
      border-radius: 8px 8px 20px 20px;
      border: 1px dashed rgba(214,190,149,.30);
    }

    .pouch-front::after {
      content: "";
      position: absolute;
      left: 0;
      right: 0;
      top: 0;
      height: 14px;
      background: linear-gradient(180deg, rgba(0,0,0,.18), rgba(0,0,0,0));
    }

    .brand-logo {
      position: absolute;
      left: 50%;
      top: 104px;
      width: 66px;
      height: 66px;
      margin-left: -33px;
      border-radius: 50%;
      object-fit: cover;
      background: rgba(255,255,255,.96);
      padding: 3px;
      z-index: 6;
      box-shadow: 0 8px 18px rgba(0,0,0,.10);
      opacity: 0;
      animation: logoIn .4s ease 2.45s forwards;
    }

    .flap {
      position: absolute;
      left: 10px;
      right: 10px;
      top: -14px;
      height: 60px;
      border-radius: 16px 16px 10px 10px;
      background: linear-gradient(160deg, #a57f71, #5c3c33);
      border: 1px solid rgba(255,255,255,.10);
      box-shadow: inset 0 1px 0 rgba(255,255,255,.10);
      transform-origin: 50% 100%;
      transform: rotateX(-100deg);
      z-index: 7;
      animation: flapClose .7s cubic-bezier(.2,.7,.2,1) 2.35s forwards;
    }

    .magnet {
      position: absolute;
      left: 50%;
      top: 8px;
      width: 42px;
      height: 20px;
      margin-left: -21px;
      border-radius: 8px;
      background: linear-gradient(180deg, var(--lock-1), var(--lock-2));
      box-shadow: 0 8px 18px rgba(0,0,0,.16);
      z-index: 8;
      opacity: 0;
      transform: scale(.86);
      animation: lockIn .28s ease 3.0s forwards;
    }

    .copy {
      opacity: 0;
      transform: translateY(10px);
      animation: copyIn .5s ease 3.15s forwards;
    }

    .copy strong {
      display: block;
      font-size: 28px;
      font-weight: 600;
      color: #2b1f1b;
      margin-bottom: 8px;
    }

    .copy span {
      display: block;
      font-size: 11px;
      letter-spacing: .18em;
      text-transform: uppercase;
      color: #7a6d68;
    }

    @keyframes pouchIn {
      to { opacity: 1; transform: translateY(0) scale(1); }
    }

    @keyframes phoneSlide {
      0%   { opacity: 0; transform: translateY(0); }
      8%   { opacity: 1; transform: translateY(0); }
      22%  { opacity: 1; transform: translateY(0); }
      68%  { opacity: 1; transform: translateY(96px); }
      82%  { opacity: 1; transform: translateY(112px); }
      100% { opacity: 1; transform: translateY(112px); } /* fully inside, hidden by front cover */
    }

    @keyframes notifFade {
      0%, 45% { opacity: 1; transform: translateX(0); }
      100% { opacity: 0; transform: translateX(10px); }
    }

    @keyframes flapClose {
      from { transform: rotateX(-100deg); }
      to   { transform: rotateX(0deg); }
    }

    @keyframes lockIn {
      to { opacity: 1; transform: scale(1); }
    }

    @keyframes logoIn {
      from { opacity: 0; transform: scale(.92); }
      to   { opacity: 1; transform: scale(1); }
    }

    @keyframes copyIn {
      to { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>
  <div class="loader-wrap">
    <div class="scene">
      <div class="pouch">
        <div class="pouch-back"></div>
        <div class="pouch-opening"></div>
        <div class="pouch-front"></div>
        <img class="brand-logo" src="assets/logo.jpg" alt="The Privacy Affair logo" />
        <div class="flap"></div>
        <div class="magnet"></div>
      </div>

      <div class="phone">
        <span class="notif n1"></span>
        <span class="notif n2"></span>
        <span class="notif n3"></span>
      </div>
    </div>

    <div class="copy">
      <strong>The Privacy Affair</strong>
      <span>Camera-free moments</span>
    </div>
  </div>
</body>
</html>
